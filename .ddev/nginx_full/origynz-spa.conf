# React SPA at https://origynz.ddev.site
#
# Intentionally NOT marked #ddev-generated, so DDEV preserves it. The default
# DDEV nginx-site.conf is `default_server` (Laravel, public/), which serves
# origynzapi.ddev.site. This block has an explicit server_name, so nginx routes
# origynz.ddev.site here instead.
#
# Dev: proxy to the Vite dev server (web_extra_daemons "vite" on 127.0.0.1:5173).
# The regex server_name catches public tunnel hostnames when the share provider
# preserves its own Host header.
# Prod: comment out the proxy and serve the built assets from /var/www/html/web/dist.
server {
    listen 80;
    listen 443 ssl;
    server_name origynz.ddev.site ~^.+$;

    ssl_certificate /etc/ssl/certs/master.crt;
    ssl_certificate_key /etc/ssl/certs/master.key;

    include /etc/nginx/monitoring.conf;

    sendfile off;
    error_log /dev/stdout info;
    access_log /var/log/nginx/access.log;

    # --- API: same-origin proxy to the Laravel app (origynzapi server block).
    # Lets the SPA call /api relative to its own host, which makes the app work
    # through tunnels (ngrok) and on LAN devices where only this host is
    # reachable. Proxied over https with a pinned Host so Laravel sees the same
    # scheme+host that signed URLs are generated with. ---
    location /api/ {
        proxy_pass https://127.0.0.1:443;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_ssl_name origynzapi.ddev.site;
        proxy_set_header Host origynzapi.ddev.site;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300;
        client_max_body_size 100m;
    }

    # --- DEV: reverse-proxy to Vite, with websocket upgrade for HMR ---
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # --- PROD: serve the built SPA with history-API fallback ---
    # location / {
    #     root /var/www/html/web/dist;
    #     try_files $uri /index.html;
    # }

    include /etc/nginx/common.d/*.conf;
    include /mnt/ddev_config/nginx/*.conf;
}
